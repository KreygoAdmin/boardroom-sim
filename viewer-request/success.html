<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Request Submitted!</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #030712; color: #f3f4f6; font-family: system-ui, sans-serif; }
    .glass { background: rgba(17,24,39,0.8); border: 1px solid rgba(255,255,255,0.08); }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">
  <div class="glass rounded-2xl w-full max-w-md p-8 text-center shadow-2xl">
    <div class="text-5xl mb-4">🎙️</div>
    <h1 class="text-2xl font-bold text-white mb-2">You're in the queue!</h1>
    <p id="position-text" class="text-gray-400 text-sm mb-6">Loading queue position...</p>
    <p class="text-gray-500 text-xs">Watch the live stream to see your topic debated by the AI board.</p>
    <a href="index.html" class="mt-6 inline-block text-xs text-indigo-400 hover:text-indigo-300">← Submit another topic</a>
  </div>
  <script>
    const WEBHOOK_URL = 'https://api.kreygo.com';
    fetch(`${WEBHOOK_URL}/queue`).then(r => r.json()).then(data => {
      const count = (data.queue?.length ?? 0) + (data.current ? 1 : 0);
      const el = document.getElementById('position-text');
      if (count === 0) {
        el.textContent = 'Your topic should be up next!';
      } else {
        el.textContent = `Approximately ${count} topic${count !== 1 ? 's' : ''} ahead of yours.`;
      }
    }).catch(() => {});
  </script>
</body>
</html>
