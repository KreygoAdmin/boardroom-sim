<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Request a Boardroom Topic</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { brand: '#6366f1' } } }
    };
  </script>
  <style>
    body { background: #030712; color: #f3f4f6; font-family: system-ui, sans-serif; }
    .glass { background: rgba(17,24,39,0.8); border: 1px solid rgba(255,255,255,0.08); }
    input[type=range] { accent-color: #6366f1; }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center px-4 py-12">

  <!-- Main form card -->
  <div class="glass rounded-2xl w-full max-w-lg p-8 shadow-2xl" id="form-card">

    <div class="mb-6 text-center">
      <h1 class="text-2xl font-bold text-white tracking-tight">Request a Boardroom Topic</h1>
      <p class="text-gray-400 text-sm mt-1">Your topic goes live on stream. The AI board debates it in real time.</p>
    </div>

    <!-- Queue status -->
    <div id="queue-status" class="mb-5 text-center text-sm text-gray-500">
      Loading queue...
    </div>

    <form id="request-form" class="space-y-5">
      <!-- Name (optional) -->
      <div>
        <label class="block text-xs font-medium text-gray-400 mb-1" for="name">Your name (optional)</label>
        <input
          id="name" type="text" maxlength="50" placeholder="Anonymous"
          class="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white placeholder-gray-600 focus:outline-none focus:border-indigo-500"
        />
      </div>

      <!-- Topic message -->
      <div>
        <label class="block text-xs font-medium text-gray-400 mb-1" for="message">
          Topic or question for the board <span class="text-red-400">*</span>
        </label>
        <textarea
          id="message" rows="5" maxlength="1000" required
          placeholder="e.g. Should AI replace human CEOs? / Debate crypto as a retirement strategy / Is remote work killing company culture?"
          class="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white placeholder-gray-600 focus:outline-none focus:border-indigo-500 resize-none"
        ></textarea>
        <div class="text-right text-xs text-gray-600 mt-0.5">
          <span id="char-count">0</span>/1000
        </div>
      </div>

      <!-- Amount -->
      <div>
        <label class="block text-xs font-medium text-gray-400 mb-2" for="tip-slider">
          Amount — <span id="amount-label" class="text-indigo-400 font-semibold">$2.00</span>
          <span class="text-gray-600 ml-1">(min $2 · tip moves you up the queue)</span>
        </label>
        <input
          id="tip-slider" type="range" min="0" max="45" step="1" value="0"
          class="w-full"
        />
        <div class="flex justify-between text-xs text-gray-600 mt-0.5">
          <span id="min-label">$2 (base)</span>
          <span id="max-label">$50</span>
        </div>
      </div>

      <!-- Error message -->
      <div id="error-msg" class="hidden text-red-400 text-sm text-center rounded-lg bg-red-900/30 border border-red-700/40 px-3 py-2"></div>

      <!-- Submit -->
      <button
        type="submit" id="submit-btn"
        class="w-full bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 text-white font-semibold py-3 rounded-xl transition-colors text-sm tracking-wide"
      >
        Submit &amp; Pay
      </button>
    </form>

    <p class="text-center text-xs text-gray-700 mt-4">
      Payments processed by Stripe. Refund issued if your topic is skipped.
    </p>
  </div>

  <!-- Success card (hidden until payment) -->
  <div class="glass rounded-2xl w-full max-w-lg p-8 shadow-2xl hidden text-center" id="success-card">
    <div class="text-4xl mb-3">🎙️</div>
    <h2 class="text-xl font-bold text-white mb-2">You're in the queue!</h2>
    <p id="success-position" class="text-gray-400 text-sm mb-4"></p>
    <p class="text-gray-500 text-xs">Watch live on stream to see your topic get debated.</p>
  </div>

  <script src="app.js"></script>
</body>
</html>
